name: Weekly SEO Operations Report

on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

jobs:
  weekly-seo-report:
    name: Export weekly SEO ops report
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate weekly report artifacts
        run: |
          INDEXED_PATH="${SEO_REPORT_INDEXED_PATH:-scripts/analytics/fixtures/production/search-console-indexed.weekly.sample.csv}"
          TRAFFIC_PATH="${SEO_REPORT_TRAFFIC_PATH:-scripts/analytics/fixtures/production/search-console-traffic.weekly.sample.csv}"
          BOOKED_EVENTS_PATH="${SEO_REPORT_BOOKED_EVENTS_PATH:-scripts/analytics/fixtures/production/booked-call-events.weekly.sample.ndjson}"
          GA4_PATH="${SEO_REPORT_GA4_PATH:-scripts/analytics/fixtures/ga4/ga4-events.weekly.sample.csv}"

          node scripts/analytics/build-weekly-seo-production-report.mjs \
            --indexed "$INDEXED_PATH" \
            --traffic "$TRAFFIC_PATH" \
            --booked-events "$BOOKED_EVENTS_PATH" \
            --ga4 "$GA4_PATH" \
            --output .tmp/weekly-seo-report

      - name: Upload weekly report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-seo-report
          path: .tmp/weekly-seo-report
